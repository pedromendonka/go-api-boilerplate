<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAPI - Sanjow Nova API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .branding {
            margin-bottom: 3rem;
        }

        .logo {
            width: 200px;
            height: 200px;
            object-fit: contain;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 8px rgba(255, 107, 0, 0.5));
        }

        .acronym {
            font-size: 5.1rem;
            font-weight: 700;
            color: #000000;
            letter-spacing: 0.3em;
            padding-left: 0.3em;
            text-shadow: 0 0 10px rgba(255, 107, 0, 0.4);
            text-align: center;
        }

        .app-name {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            padding-left: 0.05em;
            color: #FF6B00;
            text-shadow:
                2px 2px 4px rgba(0, 0, 0, 0.3),
                1px 1px 0 rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: #FF6B00;
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(255, 107, 0, 0.3);
        }

        .btn-primary:hover {
            background-color: #e65f00;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.4);
        }

        .btn-secondary {
            background-color: #2a2a2a;
            color: #ffffff;
            border: 1px solid #444;
        }

        .btn-secondary:hover {
            background-color: #333;
            border-color: #555;
            transform: translateY(-2px);
        }

        .icon {
            width: 1.25rem;
            height: 1.25rem;
        }

        @media (max-width: 480px) {
            .logo {
                width: 140px;
                height: 140px;
            }

            .acronym {
                font-size: 3rem;
                letter-spacing: 0.25em;
            }

            .app-name {
                font-size: 1.2rem;
            }

            .buttons {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 250px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="branding">
            <img src="/static/logo.png" alt="SNAPI Logo" class="logo">
            <p class="acronym">SNAPI</p>
            <h1 class="app-name">Sanjow Nova API</h1>
        </div>
        <div class="buttons">
            <a href="/health" class="btn btn-secondary">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                </svg>
                Health Check
            </a>
            <a href="/docs" class="btn btn-primary">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                API Docs
            </a>
        </div>
    </div>
</body>
</html>
